name: Review Control

on:
  pull_request:
    types: [opened, edited, synchronized, reopened]
  pull_request_review:
    types: [submitted]

jobs:
  check-skip:
    runs-on: ubuntu-latest
    steps:
      - name: Check for #skipreview or Approval
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";
            const title = pr.title || "";
            const hasSkipTag = title.includes('#skipreview') || body.includes('#skipreview');
            
            if (hasSkipTag) {
              console.log("Found #skipreview tag. Skipping mandatory approval.");
              return;
            }

            const { data: reviews } = await github.rest.pull_requests.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });

            const hasApproval = reviews.some(review => review.state === 'APPROVED');

            if (!hasApproval) {
              core.setFailed("No #skipreview found AND no approval given. Please get a review or add #skipreview to the PR title/body.");
            } else {
              console.log("PR has been approved.");
            }