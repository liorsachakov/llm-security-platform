name: Review Control

on:
  pull_request:
    types: [opened, edited, synchronized, reopened]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created, edited]

jobs:
  check-skip-status:
    name: Review or Skip Check
    if: github.event.pull_request || (github.event.issue && github.event.issue.pull_request)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
      issues: read
    steps:
      - name: Check for #skipreview or Approval
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number || context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            console.log(\`Checking PR #\${issue_number} in \${owner}/\${repo}\`);
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
            });

            const hasSkipTag = comments.some(c => c.body.includes('#skipreview'));

            if (hasSkipTag) {
              return;
            }

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner,
              repo,
              pull_number: issue_number,
            });

            const hasApproval = reviews.some(r => r.state === 'APPROVED');

            if (!hasApproval) {
              core.setFailed("No approval given.");
            } else {
              console.log("PR has been approved.");
            }
