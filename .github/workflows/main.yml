name: Skip Review Action
on:
  pull_request:
    types: [opened, edited]

jobs:
  approve-pr:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.body, '#skipreview') && github.actor == 'liorsachakov'
    steps:
      - name: Approve PR
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE'
            })
